<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Formulario Votacion</title>
        <meta charset="UTF-8">
        <style>
            body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
            h1 { color: #2c3e50; }
            form { background-color: white; padding: 20px; border-radius: 8px; max-width: 600px; }
            label { font-weight: bold; display: block; margin-top: 10px; color: #2c3e50; }
            input[type=text], input[type=date] { width: 100%; padding: 8px; margin-top: 4px;
                border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
            span { color: #e74c3c; font-size: 12px; }
            .botones { margin-top: 15px; }
            input[type=reset] { background-color: #95a5a6; color: white; padding: 8px 16px;
                border: none; border-radius: 4px; cursor: pointer; }
            input[type=submit] { background-color: #27ae60; color: white; padding: 8px 16px;
                border: none; border-radius: 4px; cursor: pointer; }
            a.btn-regresar { background-color: #2c3e50; color: white; padding: 8px 16px;
                border-radius: 4px; text-decoration: none; }
        </style>
    </head>
    <body>
        <header th:replace="plantillas/partes :: cabecero"></header>
        <h1>Datos de la Votacion</h1>
        <a th:href="@{/votacion/listar}" class="btn-regresar">REGRESAR</a>
        <br/><br/>
        <form th:action="@{/votacion/guardar}" method="POST" th:object="${votacion}">
            <input type="hidden" th:field="*{id}" />

            <label>FECHA:</label>
            <input type="text" th:field="*{fecha}" placeholder="YYYY-MM-DD"/>
            <span th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></span>

            <label>PARTIDO POLITICO:</label>
            <input type="text" th:field="*{partidoPolitico}" />
            <span th:if="${#fields.hasErrors('partidoPolitico')}" th:errors="*{partidoPolitico}"></span>

            <label>CANDIDATO:</label>
            <input type="text" th:field="*{candidato}" />
            <span th:if="${#fields.hasErrors('candidato')}" th:errors="*{candidato}"></span>

            <label>VOTANTE:</label>
            <input type="text" th:field="*{votante}" />
            <span th:if="${#fields.hasErrors('votante')}" th:errors="*{votante}"></span>

            <label>PAIS:</label>
            <input type="text" th:field="*{pais}" />
            <span th:if="${#fields.hasErrors('pais')}" th:errors="*{pais}"></span>

            <label>DEPARTAMENTO:</label>
            <input type="text" th:field="*{departamento}" />
            <span th:if="${#fields.hasErrors('departamento')}" th:errors="*{departamento}"></span>

            <label>CIUDAD:</label>
            <input type="text" th:field="*{ciudad}" />
            <span th:if="${#fields.hasErrors('ciudad')}" th:errors="*{ciudad}"></span>

            <label>MESA:</label>
            <input type="text" th:field="*{mesa}" />
            <span th:if="${#fields.hasErrors('mesa')}" th:errors="*{mesa}"></span>

            <label>PUESTO POLITICO:</label>
            <input type="text" th:field="*{puestoPolitico}" />
            <span th:if="${#fields.hasErrors('puestoPolitico')}" th:errors="*{puestoPolitico}"></span>

            <label>DURACION:</label>
            <input type="text" th:field="*{duracion}" />
            <span th:if="${#fields.hasErrors('duracion')}" th:errors="*{duracion}"></span>

            <label>NUMERO TARJETON:</label>
            <input type="text" th:field="*{numeroTarjeton}" />
            <span th:if="${#fields.hasErrors('numeroTarjeton')}" th:errors="*{numeroTarjeton}"></span>

            <div class="botones">
                <input type="reset" value="LIMPIAR" />
                &nbsp;&nbsp;
                <input type="submit" value="GUARDAR" />
            </div>
        </form>
        <br/><hr>
        <footer th:replace="plantillas/partes :: pie"></footer>
    </body>
</html>
